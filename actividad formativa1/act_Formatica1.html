<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        //TAREA FORMATIVA #1
        //MÉTODOS FIND, FILTER Y MAP


        const estudiantes = [
            { id: 1, nombre: "Ana", edad: 16, curso: "Matemática", nota: 9 },
            { id: 2, nombre: "Luis", edad: 17, curso: "Historia", nota: 7 },
            { id: 3, nombre: "María", edad: 16, curso: "Matemática", nota: 10 },
            { id: 4, nombre: "Pedro", edad: 18, curso: "Biología", nota: 6 },
            { id: 5, nombre: "Sofía", edad: 17, curso: "Historia", nota: 8 }
        ];


        // 1. find() para encontrar el estudiante cuyo nombre sea "María"
        const estudianteMaria = estudiantes.find(estudiante => estudiante.nombre === "María");
        console.log("Estudiante María:", estudianteMaria);

        // 2. filter() para obtener todos los estudiantes del curso "Historia"
        const estudiantesHistoria = estudiantes.filter(estudiante => estudiante.curso === "Historia");
        console.log("Estudiantes de Historia:", estudiantesHistoria);

        // 3. map() para crear un nuevo arreglo que contenga solo los nombres de todos los estudiantes
        const nombresEstudiantes = estudiantes.map(estudiante => estudiante.nombre);
        console.log("Lista de nombres:", nombresEstudiantes);

        // 4. filter() para obtener los estudiantes con nota mayor o igual a 8
        const notasAltas = estudiantes.filter(estudiante => estudiante.nota >= 8);
        console.log("Estudiantes con nota >= 8:", notasAltas);

        // 5. map() para crear un nuevo arreglo donde todos los nombres aparezcan en mayúsculas.
        const nombresMayusculas = estudiantes.map(estudiante => estudiante.nombre.toUpperCase());
        console.log("Nombres en mayúsculas:", nombresMayusculas);




        // TAREA FORMATIVA #1 - SEGUNDA PARTE //
        const productos = [
            { id: 101, nombre: "Laptop", categoria: "Tecnología", precio: 3500, stock: 4 },
            { id: 102, nombre: "Mouse", categoria: "Tecnología", precio: 80, stock: 15 },
            { id: 103, nombre: "Cuaderno", categoria: "Útiles", precio: 12, stock: 30 },
            { id: 104, nombre: "Mochila", categoria: "Accesorios", precio: 120, stock: 8 },
            { id: 105, nombre: "Teclado", categoria: "Tecnología", precio: 150, stock: 10 }
        ];


        // 1. find() para buscar el producto con id 103.
        const productoId103 = productos.find(producto => producto.id === 103);
        console.log("Producto con ID 103:", productoId103);

        // 2. filter() para obtener todos los productos de la categoría "Tecnología".
        const tecnologia = productos.filter(producto => producto.categoria === "Tecnología");
        console.log("Productos de Tecnología:", tecnologia);

        // 3. map() para generar un nuevo arreglo con solo los nombres de los productos.
        const nombresProductos = productos.map(producto => producto.nombre);
        console.log("Nombres de productos:", nombresProductos);

        // 4. filter() para obtener los productos con precio menor a 200.
        const productosBaratos = productos.filter(producto => producto.precio < 200);
        console.log("Productos con precio menor a 200:", productosBaratos);

        // 5. map() para crear un nuevo arreglo de objetos que tenga solo esta estructura:
        const productosSimplificados = productos.map(producto => {
            return {
                nombre: producto.nombre,
                precio: producto.precio
            };
        });
        console.log("Nueva Estructura:", productosSimplificados);
       
       
        /*
        FIND(); 
        Devuelve un solo elemento (el objeto o valor).	
        Se detiene en cuanto encuentra la primera coincidencia.	
        Si no hay nada Devuelve undefined.
        FILTER();
        Devuelve un nuevo arreglo (una lista).
        Recorre todo el arreglo y busca todas las coincidencias.
        Devuelve un arreglo vacío
        */

    </script>

</body>
</html>
